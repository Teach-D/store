<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>결제 승인 처리</title>
    <style>
        body { font-family: sans-serif; max-width: 480px; margin: 60px auto; padding: 0 20px; text-align: center; }
        .spinner { font-size: 40px; animation: spin 1s linear infinite; display: inline-block; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .card { background: #f8f9fa; border-radius: 12px; padding: 24px; margin-top: 20px; text-align: left; }
        .card div { margin-bottom: 8px; font-size: 14px; }
        .card span { color: #666; }
        .success { color: #1ab26b; font-size: 48px; }
        .fail    { color: #e84c4c; font-size: 48px; }
        h2 { margin-top: 16px; }
        .btn { display: inline-block; margin-top: 20px; padding: 12px 24px; background: #3182f6;
               color: white; border-radius: 8px; text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>
    <div id="loading">
        <div class="spinner">⟳</div>
        <h2>결제 승인 처리 중...</h2>
        <p>잠시만 기다려 주세요.</p>
    </div>

    <div id="success" style="display:none;">
        <div class="success">✓</div>
        <h2>결제가 완료되었습니다</h2>
        <div class="card" id="successInfo"></div>
        <a href="/payment.html" class="btn">다시 테스트하기</a>
    </div>

    <div id="fail" style="display:none;">
        <div class="fail">✕</div>
        <h2>결제 승인 실패</h2>
        <div class="card" id="failInfo"></div>
        <a href="/payment.html" class="btn">다시 시도하기</a>
    </div>

    <script>
        const params     = new URLSearchParams(window.location.search);
        const paymentKey = params.get('paymentKey');
        const tossOrderId = params.get('orderId');   // "ORDER1" 형식
        const amount     = parseInt(params.get('amount'));

        // "ORDER1" → 1 (서버의 내부 orderId Long 타입으로 변환)
        const orderId = parseInt(tossOrderId.replace('ORDER', ''));

        // 서버에 승인 요청
        fetch('/api/payments/confirm', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ paymentKey, orderId, amount })
        })
        .then(async res => {
            document.getElementById('loading').style.display = 'none';

            if (res.ok) {
                document.getElementById('success').style.display = 'block';
                document.getElementById('successInfo').innerHTML = `
                    <div><span>주문 ID</span>: ${orderId}</div>
                    <div><span>결제금액</span>: ${amount.toLocaleString()}원</div>
                    <div><span>결제키</span>: ${paymentKey}</div>
                `;
            } else {
                const err = await res.text();
                document.getElementById('fail').style.display = 'block';
                document.getElementById('failInfo').innerHTML = `
                    <div><span>주문 ID</span>: ${orderId}</div>
                    <div><span>오류</span>: ${err}</div>
                `;
            }
        })
        .catch(err => {
            document.getElementById('loading').style.display = 'none';
            document.getElementById('fail').style.display = 'block';
            document.getElementById('failInfo').innerHTML = `<div><span>오류</span>: ${err.message}</div>`;
        });
    </script>
</body>
</html>
