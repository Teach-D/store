global:
  resolve_timeout: 5m

route:
  receiver: 'slack-notifications'
  group_by: [ 'alertname', 'queue' ]
  group_wait: 30s       # 첫 알림 전 대기 (같은 그룹 알림 묶기)
  group_interval: 5m    # 같은 그룹 반복 알림 간격
  repeat_interval: 1h   # 해소되지 않은 알림 재전송 간격
  routes:
    - match:
        severity: critical
      receiver: 'slack-critical'
      repeat_interval: 15m  # critical은 15분마다 재전송

receivers:
  - name: 'slack-notifications'
    slack_configs:
      - api_url: 'https://hooks.slack.com/services/YOUR/SLACK/WEBHOOK'
        channel: '#alerts'
        send_resolved: true
        title: ':warning: {{ .CommonAnnotations.summary }}'
        text: '{{ .CommonAnnotations.description }}'

  - name: 'slack-critical'
    slack_configs:
      - api_url: 'https://hooks.slack.com/services/YOUR/SLACK/WEBHOOK'
        channel: '#alerts-critical'
        send_resolved: true
        title: ':red_circle: [CRITICAL] {{ .CommonAnnotations.summary }}'
        text: '{{ .CommonAnnotations.description }}'

inhibit_rules:
  # warning이 critical로 escalate되면 warning 알림 억제
  - source_match:
      severity: 'critical'
    target_match:
      severity: 'warning'
    equal: [ 'queue' ]
